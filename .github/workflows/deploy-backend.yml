name: Deploy Backend — Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC Federated Credential (sin secrets de larga duración)
  contents: read

env:
  IMAGE_NAME: sdia-backend
  ACA_APP_NAME: sdia-api

jobs:
  build-and-deploy:
    name: Build → Push ACR → Deploy ACA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Azure Login via OIDC ──────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Build & Push Docker image ─────────────────────────────────
      - name: Build and push to ACR
        working-directory: backend
        run: |
          az acr build \
            --registry ${{ secrets.ACR_LOGIN_SERVER }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile \
            .

      # ── Deploy to Azure Container Apps ───────────────────────────
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Verify deployment ─────────────────────────────────────────
      - name: Verify health endpoint
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          sleep 15
          curl -f "https://${APP_URL}/health" || exit 1
          echo "✅ Backend deployed and healthy: https://${APP_URL}"
